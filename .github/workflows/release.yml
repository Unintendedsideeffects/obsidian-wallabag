name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run package

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wallabag-*.zip
          generate_release_notes: true
